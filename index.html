<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Bahía RP - Servidor FiveM Caribeño</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--caribbean-blue:#00D4FF;
--tropical-orange:#FF6B35;
--sunset-pink:#FF006E;
--sand-gold:#FFD700;
--deep-ocean:#0066CC;
--palm-green:#2ECC71;
}

body{
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:#fff;
}

/* HERO ORIGINAL */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-family:'Bebas Neue';
font-size:6rem;
color:var(--caribbean-blue);
}

.section{padding:80px 20px;}

.title{
text-align:center;
font-size:3rem;
font-family:'Bebas Neue';
margin-bottom:50px;
background:linear-gradient(45deg,var(--caribbean-blue),var(--sand-gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* COCHES ORIGINAL */
.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
max-width:1200px;
margin:auto;
}

.car{
position:relative;
overflow:hidden;
border-radius:20px;
border:2px solid var(--caribbean-blue);
}

.car img{
width:100%;
height:250px;
object-fit:cover;
transition:.4s;
}

.car:hover img{transform:scale(1.2);}

.car .overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:20px;
background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
transform:translateY(100%);
transition:.3s;
}

.car:hover .overlay{transform:translateY(0);}

/* NUEVA SECCIÓN COLLAGE CIUDADANOS */
.collage{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-auto-rows:200px;
gap:15px;
max-width:1200px;
margin:auto;
}

.item{
position:relative;
overflow:hidden;
border-radius:15px;
border:2px solid rgba(0,212,255,.3);
}

.item img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.item:hover img{transform:scale(1.1);}

.item.large{grid-column:span 2;grid-row:span 2;}
.item.tall{grid-row:span 2;}
.item.wide{grid-column:span 2;}

.info{
position:absolute;
bottom:0;
left:0;
right:0;
padding:15px;
background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
transform:translateY(100%);
transition:.3s;
}

.item:hover .info{transform:translateY(0);}

.name{font-family:'Bebas Neue';color:var(--sand-gold);font-size:1.3rem;}
.role{color:var(--caribbean-blue);font-size:.8rem;}

footer{
padding:40px;
text-align:center;
border-top:2px solid var(--caribbean-blue);
}

</style>
</head>

<body>

<section class="hero">
<div>
<h1>🌴 BAHÍA RP 🌴</h1>
<p>Servidor caribeño de FiveM con economía equilibrada y rol único</p>
</div>
</section>

<!-- COCHES (MANTENIDO) -->
<section class="section">
<h2 class="title">🏎️ Coches</h2>
<div class="cars">

<div class="car">
<img src="https://r2.fivemanage.com/HENiDeoxdlcdrEAPCqEzy/a2ac30-sd3.jpg">
<div class="overlay"><h3>Deportivos</h3></div>
</div>

<div class="car">
<img src="https://r2.fivemanage.com/HENiDeoxdlcdrEAPCqEzy/6fcc11-yos8.jpg">
<div class="overlay"><h3>Offroad</h3></div>
</div>

<div class="car">
<img src="https://r2.fivemanage.com/HENiDeoxdlcdrEAPCqEzy/273eec-dmttc5.webp">
<div class="overlay"><h3>Clásicos</h3></div>
</div>

</div>
</section>

<!-- NUEVA SECCIÓN COLLAGE -->
<section class="section">
<h2 class="title">👥 Ciudadanos</h2>

<div class="collage">

<div class="item large">
<img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d">
<div class="info"><div class="name">Carlos</div><div class="role">Empresario</div></div>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">
<div class="info"><div class="name">María</div><div class="role">Médica</div></div>
</div>

<div class="item tall">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
<div class="info"><div class="name">Ricky</div><div class="role">Mecánico</div></div>
</div>

<div class="item wide">
<img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80">
<div class="info"><div class="name">Isabella</div><div class="role">Artista</div></div>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e">
<div class="info"><div class="name">Juan</div><div class="role">Policía</div></div>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2">
<div class="info"><div class="name">Elena</div><div class="role">Chef</div></div>
</div>

</div>

</section>

<footer>
<p>© 2026 Bahía RP</p>
</footer>

</body>
</html>
